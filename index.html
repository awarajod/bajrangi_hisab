<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAJRANGI DIAMONDS - CLOUD FIXED</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Gujarati:wght@400;700&family=Noto+Serif+Gujarati:wght@900&display=swap');
    :root { --primary: #4338ca; --bg: #f1f5f9; --sidebar: #ffffff; --success: #10b981; --danger: #ef4444; --border: #e2e8f0; }
    body { font-family: 'Plus Jakarta Sans', 'Noto Sans Gujarati', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
    .logo-box { text-align: center; margin-bottom: 25px; position: relative; }
    .brand-name { font-size: 1.5rem; font-weight: 800; color: #1e1b4b; margin-bottom: 15px; display: block; }
    .image-container { position: relative; width: 120px; height: 120px; margin: 0 auto; }
    #logo-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #eef2ff; }
    .upload-btn { position: absolute; bottom: 0; right: 0; background: var(--primary); color: white; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid white; }

    .nav-item { padding: 12px 15px; border-radius: 12px; cursor: pointer; color: #64748b; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .nav-item.active { background: var(--primary); color: white; }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding-bottom: 110px; }
    header { background: white; padding: 15px 35px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .content { padding: 25px; max-width: 1200px; margin: 0 auto; width: 100%; }
    
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
    .stat-card { background: #fff; padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
    .stat-card .val { font-size: 1.6rem; font-weight: 800; color: var(--primary); }

    .table-box { background: white; border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8fafc; padding: 15px; color: #64748b; font-size: 0.8rem; border-bottom: 1px solid var(--border); }
    td { padding: 12px; border-bottom: 1px solid #f8fafc; text-align: center; font-weight: 700; }
    
    .btn-section { background: #eef2ff; color: var(--primary); padding: 10px 20px; font-weight: 800; border-radius: 10px; border: none; cursor: pointer; margin-right: 5px; }
    .btn-section.active-tab { background: var(--primary); color: white; }

    .bottom-bar { position: fixed; bottom: 0; right: 0; left: 300px; background: white; padding: 15px 35px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .btn-next { background: var(--primary); color: white; padding: 12px 22px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; }
</style>
</head>
<body>

<div class="sidebar">
    <div class="logo-box">
        <span class="brand-name">BAJRANGI DIAMONDS</span>
        <div class="image-container">
            <img id="logo-img" src="https://via.placeholder.com/120?text=Logo" alt="Logo">
            <label for="fileInput" class="upload-btn">📷</label>
            <input type="file" id="fileInput" hidden accept="image/*" onchange="uploadPhoto(this)">
        </div>
        <div style="font-family:'Noto Serif Gujarati'; font-size:1.5rem; font-weight:900; color:var(--primary); margin-top:15px;">ચમક આપકી</div>
    </div>
    <div class="nav-group">
        <div class="nav-item active" onclick="showView('admin')">📊 મેઈન ડેશબોર્ડ</div>
        <div class="nav-item" onclick="showView('worker')">👤 કારીગર પોર્ટલ</div>
        <div class="nav-item" style="color:var(--danger); margin-top:50px;" onclick="resetSystem()">🛑 આખા મહિનાનો ડેટા સાફ કરો</div>
    </div>
</div>

<div class="main">
    <header>
        <h2 id="pageTitle" style="margin:0;">તળીયા વિભાગ</h2>
        <div style="display:flex; gap:15px; align-items:center;">
            <span id="headerDate" style="font-weight:900; color:var(--primary); font-size:1.1rem;"></span>
            <button id="syncBtn" class="btn-next" style="background:#10b981; padding:8px 15px;" onclick="syncToCloud()">☁️ શીટમાં સેવ કરો</button>
        </div>
    </header>

    <div id="admin-view" class="content">
        <div class="stats">
            <div class="stat-card"><h4>વિભાગ કુલ નંગ</h4><span class="val" id="s-nang">0</span></div>
            <div class="stat-card"><h4>વિભાગ મજૂરી</h4><span class="val" id="s-majuri" style="color:var(--success)">₹0</span></div>
            <div class="stat-card"><h4>વિભાગ ઉપાડ</h4><span class="val" id="s-upad" style="color:var(--danger)">₹0</span></div>
        </div>
        
        <div style="display:flex; margin-bottom:15px;">
            <button class="btn-section active-tab" onclick="changeSec('section1',9,'તળીયા વિભાગ', this)">તળીયા</button>
            <button class="btn-section" onclick="changeSec('section2',4.75,'પેલ વિભાગ', this)">પેલ</button>
            <button class="btn-section" onclick="changeSec('section3',5.25,'મથાળા વિભાગ', this)">મથાળા</button>
        </div>
        <div id="table-render" class="table-box"></div>
    </div>

    <div id="worker-view" class="content" style="display:none; text-align:center;">
        <div style="max-width:400px; margin:auto; background:white; padding:40px; border-radius:25px; border:1px solid var(--border);">
            <h3>👤 કારીગર હિસાબ</h3>
            <select id="worker-sel" style="width:100%; padding:15px; border-radius:12px; font-weight:800;" onchange="showWorkerDetails()">
                <option value="">-- નામ પસંદ કરો --</option>
            </select>
            <div id="worker-res" style="margin-top:25px; text-align:left;"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-next" style="background:#f8fafc; color:#333; border:1px solid #ddd;" onclick="exportFullExcel()">📊 આખા મહિનાનું એક્સલ</button>
        <div style="display:flex; gap:30px; align-items:center;">
            <div style="text-align:right;">
                <div style="font-size:0.8rem; font-weight:700; color:#64748b;">આજનો કુલ બાકી હિસાબ</div>
                <div id="final-total" style="font-weight:900; font-size:1.6rem; color:var(--primary);">₹0</div>
            </div>
            <button class="btn-next" onclick="nextDay()">💾 સેવ અને DAY શરૂ કરો →</button>
        </div>
    </div>
</div>

<script>
// AAPKA NAYA SCRIPT URL UPDATE KAR DIYA HAI
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyY8NIoV-Vg-kNS-YyxGTIK3pEGvX37HsMIy2XpxA3OJiYNvMLoyiCgJQMd_OJrZvnB/exec";

const baseNames = {
    "section1": ["હાર્દિક","S.H. સોની","જીગ્નેશ","અંકિત","ભારતી A","જીગો","ગૌતમ","નયના","હિંમત","સિદ્ધુ","રિંકલ","સાગર","શિલ્પા"].map(n => ({name:n, rate:9, status:'Present'})),
    "section2": ["કૈલાશ","ભરત","મૂળજીભાઈ","જનક","અમિત","નીતા","જ્યોતિ"].map(n => ({name:n, rate:4.75, status:'Present'})),
    "section3": ["નિકુલ","વીનેશ","ધમો","જીગ્ના","મયલો","અમિત","હરેશ"].map(n => ({name:n, rate:5.25, status:'Present'}))
};

let db = JSON.parse(localStorage.getItem('baj_final_v30')) || [{ dayNum: 1, date: new Date().toLocaleDateString('gu-IN'), sections: JSON.parse(JSON.stringify(baseNames)) }];
let activeS = 'section1';

window.onload = () => {
    document.getElementById('headerDate').innerText = "Day " + db[0].dayNum + " - " + db[0].date;
    const pic = localStorage.getItem('user_photo');
    if(pic) document.getElementById('logo-img').src = pic;
    fillWorkerNames();
    render();
};

function render() {
    let html = `<table><thead><tr><th>હાજરી</th><th>કારીગર</th><th>નંગ</th><th>મજૂરી</th><th>ઉપાડ</th></tr></thead><tbody>`;
    db[0].sections[activeS].forEach((w, i) => {
        let isA = w.status === 'Absent';
        html += `<tr style="${isA?'opacity:0.4':''}">
            <td><button style="padding:5px 10px; border-radius:20px; border:none; font-weight:800; background:${isA?'#fee2e2':'#dcfce7'}" onclick="toggleAtt('${activeS}',${i})">${isA?'A':'P'}</button></td>
            <td>${w.name}</td>
            <td><input type="number" value="${w.nang||''}" oninput="upd('${activeS}',${i},'nang',this)" placeholder="0" ${isA?'disabled':''}></td>
            <td style="color:green">₹${((w.nang||0)*w.rate).toFixed(2)}</td>
            <td><input type="number" value="${w.upad||''}" style="color:red" oninput="upd('${activeS}',${i},'upad',this)" placeholder="0" ${isA?'disabled':''}></td>
        </tr>`;
    });
    document.getElementById('table-render').innerHTML = html + "</tbody></table>";
    calc();
}

function upd(s, i, k, el) {
    db[0].sections[s][i][k] = Number(el.value) || 0;
    localStorage.setItem('baj_final_v30', JSON.stringify(db));
    calc();
}

function toggleAtt(s, i) {
    let w = db[0].sections[s][i];
    w.status = (w.status === 'Absent') ? 'Present' : 'Absent';
    if(w.status === 'Absent') { w.nang = 0; w.upad = 0; }
    localStorage.setItem('baj_final_v30', JSON.stringify(db));
    render();
}

function calc() {
    let sn=0, sm=0, su=0, tm=0, tu=0;
    db[0].sections[activeS].forEach(w => { sn += (w.nang||0); sm += (w.nang||0)*w.rate; su += (w.upad||0); });
    for(let s in db[0].sections) { db[0].sections[s].forEach(w => { tm += (w.nang||0)*w.rate; tu += (w.upad||0); }); }
    document.getElementById('s-nang').innerText = sn;
    document.getElementById('s-majuri').innerText = "₹" + sm.toFixed(2);
    document.getElementById('s-upad').innerText = "₹" + su.toFixed(2);
    document.getElementById('final-total').innerText = "₹" + (tm - tu).toFixed(2);
}

function changeSec(id, r, t, btn) {
    activeS = id; document.getElementById('pageTitle').innerText = t;
    document.querySelectorAll('.btn-section').forEach(b => b.classList.remove('active-tab'));
    btn.classList.add('active-tab');
    render();
}

function nextDay() {
    if(confirm("આજનો ડેટા સેવ કરીને Day " + (db[0].dayNum + 1) + " શરૂ કરવો છે?")) {
        let newDay = { 
            dayNum: db[0].dayNum + 1, 
            date: new Date().toLocaleDateString('gu-IN'), 
            sections: JSON.parse(JSON.stringify(baseNames)) 
        };
        db.unshift(newDay);
        localStorage.setItem('baj_final_v30', JSON.stringify(db));
        location.reload();
    }
}

// SYNC FUNCTION FIXED
async function syncToCloud() {
    const btn = document.getElementById('syncBtn');
    btn.innerText = "⏳ સેવ થાય છે...";
    btn.disabled = true;

    let flat = [];
    db.forEach(day => {
        for(let s in day.sections) {
            day.sections[s].forEach(w => {
                flat.push({
                    dayNum: day.dayNum,
                    date: day.date,
                    section: s === 'section1' ? 'તળીયા' : s === 'section2' ? 'પેલ' : 'મથાળા',
                    name: w.name,
                    nang: w.nang || 0,
                    rate: w.rate,
                    upad: w.upad || 0
                });
            });
        }
    });

    try {
        // Post request with error handling
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(flat)
        });
        alert("ગૂગલ શીટમાં સક્સેસફુલ સેવ થઈ ગયું! ✅ (Note: no-cors mode use kiya gaya hai)");
    } catch(e) {
        alert("નેટવર્ક પ્રોબ્લેમ! કૃપા કરીને ઇન્ટરનેટ ચેક કરો.");
    }
    btn.innerText = "☁️ શીટમાં સેવ કરો";
    btn.disabled = false;
}

function exportFullExcel() {
    let fullData = [];
    db.forEach(day => {
        for(let s in day.sections) {
            day.sections[s].forEach(w => {
                fullData.push({
                    "DAY": "DAY " + day.dayNum,
                    "તારીખ": day.date,
                    "વિભાગ": s === 'section1' ? 'તળીયા' : s === 'section2' ? 'પેલ' : 'મથાળા',
                    "કારીગર": w.name,
                    "નંગ": w.nang || 0,
                    "મજૂરી": ((w.nang||0)*w.rate).toFixed(2),
                    "ઉપાડ": w.upad || 0,
                    "ચોખ્ખો પગાર": (((w.nang||0)*w.rate) - (w.upad||0)).toFixed(2)
                });
            });
        }
    });
    const ws = XLSX.utils.json_to_sheet(fullData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Monthly_Report");
    XLSX.writeFile(wb, "Bajrangi_Monthly_Hisab.xlsx");
}

function resetSystem() {
    if(confirm("ચેતવણી: આખા મહિનાનો બધો ડેટા ભૂંસાઈ જશે!")) {
        localStorage.removeItem('baj_final_v30');
        location.reload();
    }
}

function uploadPhoto(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('logo-img').src = e.target.result;
            localStorage.setItem('user_photo', e.target.result);
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function showView(v) {
    document.getElementById('admin-view').style.display = v === 'admin' ? 'block' : 'none';
    document.getElementById('worker-view').style.display = v === 'worker' ? 'block' : 'none';
}

function fillWorkerNames() {
    const sel = document.getElementById('worker-sel');
    [...baseNames.section1, ...baseNames.section2, ...baseNames.section3].forEach(w => {
        let opt = document.createElement('option'); opt.value = w.name; opt.innerText = w.name;
        sel.appendChild(opt);
    });
}

function showWorkerDetails() {
    const name = document.getElementById('worker-sel').value;
    let wData = null;
    for(let s in db[0].sections) { let f = db[0].sections[s].find(x => x.name === name); if(f) wData = f; }
    if(wData) {
        let m = (wData.nang||0)*wData.rate;
        document.getElementById('worker-res').innerHTML = `<div style="background:#f8fafc; padding:20px; border-radius:12px; border:1px solid #ddd;"><p>📦 નંગ: <b>${wData.nang||0}</b></p><p>💰 મજૂરી: <b style="color:green">₹${m.toFixed(2)}</b></p><p>💸 ઉપાડ: <b style="color:red">₹${wData.upad||0}</b></p><hr><h3>બાકી: ₹${(m - (wData.upad||0)).toFixed(2)}</h3></div>`;
    }
}
</script>
</body>
</html>
