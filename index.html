<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAJRANGI DIAMONDS - FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Gujarati:wght@400;700&display=swap');
        :root { --primary: #4f46e5; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans Gujarati', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        #logo-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; background: #eee; align-self: center; cursor: pointer; border: 3px solid #eef2ff; }
        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; color: #64748b; font-weight: 600; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: var(--primary); color: white; }
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        header { background: white; padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .content { padding: 20px; max-width: 1000px; margin: 0 auto; width: 100%; padding-bottom: 100px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .stat-card b { font-size: 1.4rem; color: var(--primary); display: block; }
        .table-card { background: white; border-radius: 15px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px; font-size: 0.75rem; color: #64748b; border-bottom: 1px solid var(--border); }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #f1f5f9; font-weight: 600; }
        input { width: 70px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-weight: 800; }
        .btn-tab { padding: 8px 15px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; background: #e2e8f0; margin-right: 5px; }
        .btn-tab.active { background: var(--primary); color: white; }
        .bottom-bar { position: fixed; bottom: 0; right: 0; left: 260px; background: white; padding: 15px 30px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn-main { background: var(--primary); color: white; padding: 12px 20px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; }
        .worker-box { max-width: 400px; margin: 30px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-weight: 700; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align:center; margin-bottom:20px;">
        <input type="file" id="l-in" hidden onchange="upLogo(this)">
        <img id="logo-img" src="https://cdn-icons-png.flaticon.com/512/2913/2913520.png" onclick="document.getElementById('l-in').click()">
        <h3 style="margin:10px 0 0;">BAJRANGI</h3>
    </div>
    <div class="nav-item" id="nAd" onclick="chkAd()">📊 એડમિન</div>
    <div class="nav-item active" id="nWo" onclick="sw('worker')">👤 કારીગર</div>
    <div style="flex:1"></div>
    <div class="nav-item" style="color:var(--danger)" onclick="rst()">🛑 રીસેટ</div>
</div>

<div class="main">
    <header>
        <h3 id="pTit" style="margin:0">કારીગર પોર્ટલ</h3>
        <button id="syB" class="btn-main" style="background:var(--success); display:none;" onclick="sync()">☁️ સેવ ટુ ક્લાઉડ</button>
    </header>

    <div id="ad-v" class="content" style="display:none;">
        <div class="stats">
            <div class="stat-card">નંગ<b id="s-n">0</b></div>
            <div class="stat-card">મજૂરી<b id="s-m" style="color:var(--success)">₹0</b></div>
            <div class="stat-card">ઉપાડ<b id="s-u" style="color:var(--danger)">₹0</b></div>
        </div>
        <div style="margin-bottom:15px;">
            <button class="btn-tab active" onclick="chS('section1',this)">તળીયા</button>
            <button class="btn-tab" onclick="chS('section2',this)">પેલ</button>
            <button class="btn-tab" onclick="chS('section3',this)">મથાળા</button>
        </div>
        <div class="table-card" id="t-ren"></div>
        <h4>મંથલી હિસાબ</h4>
        <div class="table-card"><table><thead><tr><th>નામ</th><th>નંગ</th><th>મજૂરી</th><th>ઉપાડ</th><th>બાકી</th></tr></thead><tbody id="s-body"></tbody></table></div>
    </div>

    <div id="wo-v" class="content">
        <div class="worker-box">
            <select id="w-sel" onchange="getWData()"><option value="">-- નામ પસંદ કરો --</option></select>
            <div id="w-res" style="margin-top:20px;"></div>
        </div>
    </div>

    <div class="bottom-bar" id="bBar" style="display:none;">
        <button class="btn-main" style="background:#eee; color:#333" onclick="exl()">📊 Excel</button>
        <div style="text-align:right"><small>કુલ બાકી</small><div id="f-t" style="font-size:1.3rem; font-weight:900; color:var(--primary)">₹0</div></div>
        <button class="btn-main" onclick="nDay()">💾 નવો દિવસ</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyY8NIoV-Vg-kNS-YyxGTIK3pEGvX37HsMIy2XpxA3OJiYNvMLoyiCgJQMd_OJrZvnB/exec";
    const PASS = "1234";

    const names = {
        "section1": ["હાર્દિક","S.H. સોની","જીગ્નેશ","અંકિત","ભારતી A","જીગો","ગૌતમ","નયના","હિંમત","સિદ્ધુ","રિંકલ","સાગર","શિલ્પા"].map(n=>({name:n,rate:9,status:'P'})),
        "section2": ["કૈલાશ","ભરત","મૂળજીભાઈ","જનક","અમિત","નીતા","જ્યોતિ"].map(n=>({name:n,rate:4.75,status:'P'})),
        "section3": ["નિકુલ","વીનેશ","ધમો","જીગ્ના","મયલો","અમિત","હરેશ"].map(n=>({name:n,rate:5.25,status:'P'}))
    };

    let db = JSON.parse(localStorage.getItem('bj_v6')) || [{ day:1, date:new Date().toLocaleDateString('gu-IN'), sections:JSON.parse(JSON.stringify(names)) }];
    let act = 'section1', isAd = (sessionStorage.getItem('isAd')==='true');

    window.onload = () => {
        const lo = localStorage.getItem('lo'); if(lo) document.getElementById('logo-img').src = lo;
        loadSel(); 
        let v = sessionStorage.getItem('v') || 'worker';
        (isAd && v==='admin') ? sw('admin') : sw('worker');
        ren();
    };

    function chkAd() { if(isAd){sw('admin');return;} if(prompt("PASS:")===PASS){isAd=true;sessionStorage.setItem('isAd','true');sw('admin');} }
    
    function sw(v) {
        sessionStorage.setItem('v',v);
        document.getElementById('ad-v').style.display = v==='admin'?'block':'none';
        document.getElementById('wo-v').style.display = v==='worker'?'block':'none';
        document.getElementById('bBar').style.display = v==='admin'?'flex':'none';
        document.getElementById('syB').style.display = v==='admin'?'block':'none';
        document.getElementById('nAd').className = v==='admin'?'nav-item active':'nav-item';
        document.getElementById('nWo').className = v==='worker'?'nav-item active':'nav-item';
        if(v==='admin') updS();
    }

    function uV(s,i,k,v,el) {
        db[0].sections[s][i][k] = Number(v)||0;
        localStorage.setItem('bj_v6', JSON.stringify(db));
        el.closest('tr').querySelector('.m-c').innerText = "₹"+(db[0].sections[s][i].nang*db[0].sections[s][i].rate).toFixed(2);
        calc();
    }

    function ren() {
        let h = `<table><thead><tr><th>H</th><th style="text-align:left">NAME</th><th>NANG</th><th>MAJURI</th><th>UPAD</th></tr></thead><tbody>`;
        db[0].sections[act].forEach((w,i) => {
            let isA = w.status==='A';
            h += `<tr style="${isA?'opacity:0.3':''}">
                <td><button style="background:${isA?'red':'green'};color:white;border:none;border-radius:50%;width:25px;height:25px;" onclick="tgl('${act}',${i})">${w.status}</button></td>
                <td style="text-align:left">${w.name}</td>
                <td><input type="number" value="${w.nang||''}" oninput="uV('${act}',${i},'nang',this.value,this)" ${isA?'disabled':''}></td>
                <td class="m-c">₹${((w.nang||0)*w.rate).toFixed(2)}</td>
                <td><input type="number" value="${w.upad||''}" oninput="uV('${act}',${i},'upad',this.value,this)" ${isA?'disabled':''}></td>
            </tr>`;
        });
        document.getElementById('t-ren').innerHTML = h+"</tbody></table>";
        calc();
    }

    function tgl(s,i) { db[0].sections[s][i].status = db[0].sections[s][i].status==='P'?'A':'P'; localStorage.setItem('bj_v6',JSON.stringify(db)); ren(); }

    function calc() {
        let sn=0, sm=0, su=0, tm=0, tu=0;
        db[0].sections[act].forEach(w=>{ sn+=w.nang||0; sm+=(w.nang||0)*w.rate; su+=w.upad||0; });
        db.forEach(d=>{ for(let s in d.sections) d.sections[s].forEach(w=>{ tm+=(w.nang||0)*w.rate; tu+=w.upad||0; }); });
        document.getElementById('s-n').innerText=sn; document.getElementById('s-m').innerText="₹"+sm.toFixed(2);
        document.getElementById('s-u').innerText="₹"+su.toFixed(2); document.getElementById('f-t').innerText="₹"+(tm-tu).toFixed(2);
    }

    function updS() {
        let res = {}; db.forEach(d=>{ for(let s in d.sections) d.sections[s].forEach(w=>{ if(!res[w.name])res[w.name]={n:0,m:0,u:0}; res[w.name].n+=w.nang||0; res[w.name].m+=(w.nang||0)*w.rate; res[w.name].u+=w.upad||0; }); });
        let h = ""; Object.keys(res).sort().forEach(n=>{ let b=res[n].m-res[n].u; if(res[n].n>0||res[n].u>0) h+=`<tr><td style="text-align:left">${n}</td><td>${res[n].n}</td><td>₹${res[n].m.toFixed(2)}</td><td>₹${res[n].u}</td><td>₹${b.toFixed(2)}</td></tr>`; });
        document.getElementById('s-body').innerHTML = h;
    }

    async function sync() {
        const b = document.getElementById('syB'); b.innerText="⌛...";
        let flat = []; db.forEach(d=>{ for(let s in d.sections) d.sections[s].forEach(w=>{ if(w.nang||w.upad) flat.push({day:d.day, date:d.date, section:s, name:w.name, nang:w.nang||0, rate:w.rate, upad:w.upad||0}); }); });
        try {
            await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body:JSON.stringify(flat) });
            alert("SUCCESS! ✅");
        } catch(e) { alert("ERR!"); }
        b.innerText="☁️ સેવ ટુ ક્લાઉડ";
    }

    async function getWData() {
        const name = document.getElementById('w-sel').value; if(!name) return;
        const res = document.getElementById('w-res'); res.innerHTML = "⌛ લોડ થઈ રહ્યો છે...";
        try {
            const r = await fetch(SCRIPT_URL);
            const data = await r.json();
            let n=0, m=0, u=0;
            data.forEach(row => { if(row[3] == name) { n+=Number(row[4]); m+=(Number(row[4])*Number(row[5])); u+=Number(row[6]); } });
            if(n==0 && u==0) { res.innerHTML = "❌ ડેટા મળ્યો નથી."; return; }
            res.innerHTML = `<div style="background:#eef2ff;padding:15px;border-radius:10px;border:2px solid var(--primary);">
                <h3 style="margin:0 0 10px;text-align:center;">${name}</h3>
                <p>📦 નંગ: <b>${n}</b></p>
                <p>💰 મજૂરી: <b style="color:green">₹${m.toFixed(2)}</b></p>
                <p>💸 ઉપાડ: <b style="color:red">₹${u}</b></p><hr>
                <h4 style="margin:0;text-align:center;">બાકી: ₹${(m-u).toFixed(2)}</h4></div>`;
        } catch(e) { res.innerHTML = "⚠️ નેટવર્ક પ્રોબ્લેમ!"; }
    }

    function upLogo(i) { if(i.files[0]){ let r=new FileReader(); r.onload=(e)=>{ document.getElementById('logo-img').src=e.target.result; localStorage.setItem('lo',e.target.result); }; r.readAsDataURL(i.files[0]); } }
    function loadSel() { const s=document.getElementById('w-sel'); let a=[]; for(let x in names) names[x].forEach(w=>a.push(w.name)); a.sort().forEach(n=>{ let o=document.createElement('option'); o.value=n; o.innerText=n; s.appendChild(o); }); }
    function nDay() { if(confirm("નવો દિવસ?")){ db.unshift({day:db[0].day+1, date:new Date().toLocaleDateString('gu-IN'), sections:JSON.parse(JSON.stringify(names))}); localStorage.setItem('bj_v6',JSON.stringify(db)); location.reload(); } }
    function chS(s,b) { act=s; document.querySelectorAll('.btn-tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); ren(); }
    function rst() { if(prompt("PASS:")===PASS){localStorage.clear();location.reload();} }
    function exl() { let l=[]; db.forEach(d=>{ for(let s in d.sections) d.sections[s].forEach(w=>{ if(w.nang||w.upad) l.push({Day:d.day,Date:d.date,Name:w.name,Nang:w.nang,Majuri:w.nang*w.rate,Upad:w.upad}); }); }); const ws=XLSX.utils.json_to_sheet(l); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Data"); XLSX.writeFile(wb,"Report.xlsx"); }
</script>
</body>
</html>
