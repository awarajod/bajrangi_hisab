<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAJRANGI DIAMONDS - PREMIUM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Gujarati:wght@400;700&family=Noto+Serif+Gujarati:wght@900&display=swap');

    :root {
        --primary: #4338ca; 
        --primary-light: #eef2ff;
        --bg: #f8fafc; 
        --card: #ffffff;
        --success: #059669; 
        --danger: #dc2626; 
        --border: #e2e8f0;
        --text-main: #1e293b;
        --text-sub: #64748b;
    }

    body { 
        font-family: 'Plus Jakarta Sans', 'Noto Sans Gujarati', sans-serif; 
        margin: 0; background: var(--bg); color: var(--text-main);
        display: flex; height: 100vh; overflow: hidden; 
    }

    /* SIDEBAR */
    .sidebar { width: 280px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; box-shadow: 4px 0 10px rgba(0,0,0,0.02); }
    .logo-box { text-align: center; margin-bottom: 30px; }
    .brand-name { font-size: 1.4rem; font-weight: 800; color: #1e1b4b; letter-spacing: -0.5px; margin-bottom: 20px; display: block; }
    
    .image-container { position: relative; width: 110px; height: 110px; margin: 0 auto; }
    #logo-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary-light); box-shadow: 0 4px 12px rgba(67, 56, 202, 0.15); }
    .upload-btn { position: absolute; bottom: 0; right: 0; background: var(--primary); color: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; font-size: 14px; }

    .nav-item { padding: 14px 16px; border-radius: 12px; cursor: pointer; color: var(--text-sub); font-weight: 600; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 12px; }
    .nav-item:hover { background: var(--primary-light); color: var(--primary); }
    .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(67, 56, 202, 0.25); }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding-bottom: 100px; }
    header { background: white; padding: 18px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    
    .btn-sync { background: var(--success); color: white; padding: 10px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-sync:active { transform: scale(0.95); }

    .content { padding: 30px 40px; max-width: 1100px; margin: 0 auto; width: 100%; }
    
    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 18px; border: 1px solid var(--border); text-align: center; transition: 0.3s; }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.04); }
    .stat-card h4 { margin: 0 0 8px 0; color: var(--text-sub); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .val { font-size: 1.8rem; font-weight: 800; color: var(--primary); }

    /* TABS */
    .tab-container { display: flex; background: #e2e8f0; padding: 5px; border-radius: 14px; width: fit-content; margin-bottom: 25px; }
    .btn-section { background: transparent; color: var(--text-sub); padding: 10px 24px; font-weight: 700; border-radius: 10px; border: none; cursor: pointer; transition: 0.3s; }
    .btn-section.active-tab { background: white; color: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

    /* TABLE */
    .table-box { background: white; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8fafc; padding: 16px; color: var(--text-sub); font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid var(--border); text-align: center; }
    td { padding: 14px; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: 600; font-size: 1rem; }
    
    input { border: 2px solid #f1f5f9; padding: 10px; border-radius: 10px; width: 90px; text-align: center; font-weight: 800; font-family: inherit; transition: 0.2s; background: #f8fafc; }
    input:focus { border-color: var(--primary); background: white; outline: none; box-shadow: 0 0 0 3px var(--primary-light); }

    /* WORKER VIEW */
    .worker-card { max-width: 450px; margin: 40px auto; background: white; padding: 35px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid var(--border); }

    /* BOTTOM BAR */
    .bottom-bar { position: fixed; bottom: 0; right: 0; left: 280px; background: white; padding: 20px 40px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .btn-main { background: var(--primary); color: white; padding: 14px 28px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; box-shadow: 0 4px 12px rgba(67, 56, 202, 0.2); }
</style>
</head>
<body>

<div class="sidebar">
    <div class="logo-box">
        <span class="brand-name">BAJRANGI DIAMONDS</span>
        <div class="image-container">
            <img id="logo-img" src="https://via.placeholder.com/120?text=Logo" alt="Logo">
            <label for="fileInput" class="upload-btn">📷</label>
            <input type="file" id="fileInput" hidden accept="image/*" onchange="uploadPhoto(this)">
        </div>
        <div style="font-family:'Noto Serif Gujarati'; font-size:1.6rem; font-weight:900; color:var(--primary); margin-top:18px;">ચમક આપકી</div>
    </div>
    
    <div class="nav-item active" id="navAdmin" onclick="showView('admin')">📊 મેઈન ડેશબોર્ડ</div>
    <div class="nav-item" id="navWorker" onclick="showView('worker')">👤 કારીગર પોર્ટલ</div>
    
    <div style="flex:1"></div>
    <div class="nav-item" style="color:var(--danger); font-size: 0.9rem;" onclick="resetSystem()">🛑 ડેટા સાફ કરો</div>
</div>

<div class="main">
    <header>
        <h2 id="pageTitle" style="margin:0; font-weight:800; color:#1e1b4b;">તળીયા વિભાગ</h2>
        <div style="display:flex; gap:20px; align-items:center;">
            <div id="headerDate" style="font-weight:700; color:var(--text-sub); background:var(--primary-light); padding:8px 15px; border-radius:10px;"></div>
            <button id="syncBtn" class="btn-sync" onclick="syncToCloud()">☁️ ક્લાઉડમાં સેવ કરો</button>
        </div>
    </header>

    <div id="admin-view" class="content">
        <div class="stats">
            <div class="stat-card"><h4>આ વિભાગના કુલ નંગ</h4><span class="val" id="s-nang">0</span></div>
            <div class="stat-card"><h4>આ વિભાગની મજૂરી</h4><span class="val" id="s-majuri" style="color:var(--success)">₹0</span></div>
            <div class="stat-card"><h4>આ વિભાગનો ઉપાડ</h4><span class="val" id="s-upad" style="color:var(--danger)">₹0</span></div>
        </div>
        
        <div class="tab-container">
            <button id="btn1" class="btn-section active-tab" onclick="changeSec('section1', 9, 'તળીયા વિભાગ', this)">તળીયા</button>
            <button id="btn2" class="btn-section" onclick="changeSec('section2', 4.75, 'પેલ વિભાગ', this)">પેલ</button>
            <button id="btn3" class="btn-section" onclick="changeSec('section3', 5.25, 'મથાળા વિભાગ', this)">મથાળા</button>
        </div>

        <div id="table-render" class="table-box"></div>
    </div>

    <div id="worker-view" class="content" style="display:none;">
        <div class="worker-card">
            <h2 style="text-align:center; margin-top:0;">કારીગર હિસાબ</h2>
            <p style="text-align:center; color:var(--text-sub); margin-bottom:25px;">તમારું નામ પસંદ કરો</p>
            <select id="worker-sel" style="width:100%; padding:15px; border-radius:15px; font-weight:700; border:2px solid var(--border); font-size:1.1rem;" onchange="showWorkerDetails()">
                <option value="">-- નામ પસંદ કરો --</option>
            </select>
            <div id="worker-res" style="margin-top:30px;"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-main" style="background:#f1f5f9; color:var(--text-main); box-shadow:none; border:1px solid #ddd;" onclick="exportFullExcel()">📊 એક્સલ ડાઉનલોડ</button>
        <div style="display:flex; gap:40px; align-items:center;">
            <div style="text-align:right;">
                <div style="font-size:0.8rem; font-weight:700; color:var(--text-sub); text-transform:uppercase;">કુલ બાકી પેમેન્ટ</div>
                <div id="final-total" style="font-weight:900; font-size:1.8rem; color:var(--primary);">₹0</div>
            </div>
            <button class="btn-main" onclick="nextDay()">💾 સેવ અને નવો દિવસ →</button>
        </div>
    </div>
</div>

<script>
// AAPKA SCRIPT URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyY8NIoV-Vg-kNS-YyxGTIK3pEGvX37HsMIy2XpxA3OJiYNvMLoyiCgJQMd_OJrZvnB/exec";

const baseNames = {
    "section1": ["હાર્દિક","S.H. સોની","જીગ્નેશ","અંકિત","ભારતી A","જીગો","ગૌતમ","નયના","હિંમત","સિદ્ધુ","રિંકલ","સાગર","શિલ્પા"].map(n => ({name:n, rate:9, status:'Present'})),
    "section2": ["કૈલાશ","ભરત","મૂળજીભાઈ","જનક","અમિત","નીતા","જ્યોતિ"].map(n => ({name:n, rate:4.75, status:'Present'})),
    "section3": ["નિકુલ","વીનેશ","ધમો","જીગ્ના","મયલો","અમિત","હરેશ"].map(n => ({name:n, rate:5.25, status:'Present'}))
};

let db = JSON.parse(localStorage.getItem('baj_v4_final')) || [{ dayNum: 1, date: new Date().toLocaleDateString('gu-IN'), sections: JSON.parse(JSON.stringify(baseNames)) }];
let activeS = 'section1';

window.onload = () => {
    updateHeader();
    const pic = localStorage.getItem('user_photo');
    if(pic) document.getElementById('logo-img').src = pic;
    fillWorkerNames();
    render();
};

function updateHeader() {
    document.getElementById('headerDate').innerText = "Day " + db[0].dayNum + " | " + db[0].date;
}

function render() {
    let html = `<table><thead><tr><th>હાજરી</th><th style="text-align:left">કારીગરનું નામ</th><th>નંગ</th><th>મજૂરી</th><th>ઉપાડ</th></tr></thead><tbody>`;
    db[0].sections[activeS].forEach((w, i) => {
        let isA = w.status === 'Absent';
        let majuri = (w.nang || 0) * w.rate;
        html += `<tr style="${isA?'opacity:0.4; background:#fff5f5':''}">
            <td><button style="width:35px; height:35px; border-radius:50%; border:none; font-weight:800; cursor:pointer; background:${isA?'var(--danger)':'var(--success)'}; color:white" onclick="toggleAtt('${activeS}',${i})">${isA?'A':'P'}</button></td>
            <td style="text-align:left; font-size:1.1rem; padding-left:20px;">${w.name}</td>
            <td><input type="number" value="${w.nang||''}" oninput="upd('${activeS}',${i},'nang',this)" placeholder="0" ${isA?'disabled':''}></td>
            <td style="color:var(--success); font-weight:800;">₹${majuri.toFixed(2)}</td>
            <td><input type="number" value="${w.upad||''}" style="color:var(--danger)" oninput="upd('${activeS}',${i},'upad',this)" placeholder="0" ${isA?'disabled':''}></td>
        </tr>`;
    });
    document.getElementById('table-render').innerHTML = html + "</tbody></table>";
    calc();
}

// AUTO MULTIPLY & UPDATE FUNCTION
function upd(s, i, k, el) {
    db[0].sections[s][i][k] = Number(el.value) || 0;
    localStorage.setItem('baj_v4_final', JSON.stringify(db));
    
    // UI mein majuri turant update karne ke liye
    if(k === 'nang') {
        const row = el.closest('tr');
        const majuriTd = row.cells[3];
        const newMajuri = db[0].sections[s][i].nang * db[0].sections[s][i].rate;
        majuriTd.innerText = "₹" + newMajuri.toFixed(2);
    }
    calc();
}

function toggleAtt(s, i) {
    let w = db[0].sections[s][i];
    w.status = (w.status === 'Absent') ? 'Present' : 'Absent';
    if(w.status === 'Absent') { w.nang = 0; w.upad = 0; }
    localStorage.setItem('baj_v4_final', JSON.stringify(db));
    render();
}

function calc() {
    let sn=0, sm=0, su=0, tm=0, tu=0;
    db[0].sections[activeS].forEach(w => { sn += (w.nang||0); sm += (w.nang||0)*w.rate; su += (w.upad||0); });
    db.forEach(day => {
        for(let s in day.sections) { day.sections[s].forEach(w => { tm += (w.nang||0)*w.rate; tu += (w.upad||0); }); }
    });
    document.getElementById('s-nang').innerText = sn;
    document.getElementById('s-majuri').innerText = "₹" + sm.toFixed(2);
    document.getElementById('s-upad').innerText = "₹" + su.toFixed(2);
    document.getElementById('final-total').innerText = "₹" + (tm - tu).toFixed(2);
}

function changeSec(id, r, t, btn) {
    activeS = id; 
    document.getElementById('pageTitle').innerText = t;
    document.querySelectorAll('.btn-section').forEach(b => b.classList.remove('active-tab'));
    btn.classList.add('active-tab');
    render();
}

function showView(v) {
    document.getElementById('admin-view').style.display = v === 'admin' ? 'block' : 'none';
    document.getElementById('worker-view').style.display = v === 'worker' ? 'block' : 'none';
    document.getElementById('navAdmin').classList.toggle('active', v === 'admin');
    document.getElementById('navWorker').classList.toggle('active', v === 'worker');
}

function fillWorkerNames() {
    const sel = document.getElementById('worker-sel');
    sel.innerHTML = '<option value="">-- નામ પસંદ કરો --</option>';
    let all = [];
    for(let s in baseNames) baseNames[s].forEach(w => all.push(w.name));
    all.sort().forEach(n => {
        let o = document.createElement('option'); o.value = n; o.innerText = n; sel.appendChild(o);
    });
}

function showWorkerDetails() {
    const name = document.getElementById('worker-sel').value;
    if(!name) { document.getElementById('worker-res').innerHTML = ""; return; }
    
    let totalNang = 0, totalMaj = 0, totalUpad = 0;
    db.forEach(day => {
        for(let s in day.sections) {
            let f = day.sections[s].find(x => x.name === name);
            if(f) { totalNang += (f.nang||0); totalMaj += (f.nang||0)*f.rate; totalUpad += (f.upad||0); }
        }
    });

    document.getElementById('worker-res').innerHTML = `
        <div style="background:var(--primary-light); padding:25px; border-radius:20px; border:2px solid var(--primary);">
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span>📦 કુલ નંગ:</span> <b>${totalNang}</b></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span>💰 કુલ મજૂરી:</span> <b style="color:var(--success)">₹${totalMaj.toFixed(2)}</b></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span>💸 કુલ ઉપાડ:</span> <b style="color:var(--danger)">₹${totalUpad}</b></div>
            <div style="background:white; padding:15px; border-radius:12px; display:flex; justify-content:space-between; margin-top:15px; border:1px solid var(--primary);">
                <span style="font-weight:800;">🔥 બાકી લેવાના:</span> 
                <b style="font-size:1.4rem; color:var(--primary)">₹${(totalMaj - totalUpad).toFixed(2)}</b>
            </div>
        </div>`;
}

async function syncToCloud() {
    const btn = document.getElementById('syncBtn');
    btn.innerText = "⏳ સેવ થાય છે..."; btn.disabled = true;
    let flat = [];
    db.forEach(day => {
        for(let s in day.sections) {
            day.sections[s].forEach(w => {
                flat.push({ day: day.dayNum, date: day.date, section: s, name: w.name, nang: w.nang||0, rate: w.rate, upad: w.upad||0 });
            });
        }
    });
    try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(flat) });
        alert("ડેટા ક્લાઉડમાં સેવ થઈ ગયો! ✅");
    } catch(e) { alert("Error!"); }
    btn.innerText = "☁️ ક્લાઉડમાં સેવ કરો"; btn.disabled = false;
}

function nextDay() {
    if(confirm("આજનો હિસાબ સેવ કરીને નવો દિવસ શરૂ કરવો છે?")) {
        let newDay = { dayNum: db[0].dayNum + 1, date: new Date().toLocaleDateString('gu-IN'), sections: JSON.parse(JSON.stringify(baseNames)) };
        db.unshift(newDay);
        localStorage.setItem('baj_v4_final', JSON.stringify(db));
        location.reload();
    }
}

function exportFullExcel() {
    let list = [];
    db.forEach(d => {
        for(let s in d.sections) {
            d.sections[s].forEach(w => {
                list.push({ "Day": d.dayNum, "તારીખ": d.date, "કારીગર": w.name, "નંગ": w.nang||0, "મજૂરી": ((w.nang||0)*w.rate).toFixed(2), "ઉપાડ": w.upad||0 });
            });
        }
    });
    const ws = XLSX.utils.json_to_sheet(list);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Hisab");
    XLSX.writeFile(wb, "Bajrangi_Diamonds_Report.xlsx");
}

function uploadPhoto(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('logo-img').src = e.target.result;
            localStorage.setItem('user_photo', e.target.result);
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function resetSystem() {
    if(confirm("બધો ડેટા સાફ થઈ જશે. શું તમે ચોક્કસ છો?")) {
        localStorage.removeItem('baj_v4_final');
        location.reload();
    }
}
</script>
</body>
</html>
